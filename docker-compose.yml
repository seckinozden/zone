services:
  postgres:
    image: postgres:16
    container_name: zone-postgres
    environment:
      POSTGRES_DB: zone
      POSTGRES_USER: zone
      POSTGRES_PASSWORD: zone
    ports:
      - "5433:5432"
    volumes:
      - zone-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zone -d zone"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  zone-postgres-data:
