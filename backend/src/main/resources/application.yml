spring:
  application:
    name: zone-backend
  datasource:
    url: jdbc:postgresql://localhost:5433/zone
    username: zone
    password: zone
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
